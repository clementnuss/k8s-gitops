---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nut-secret
  namespace: kube-nut
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: nut-secret
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
  - extract:
      key: k8s/kube-nut/nut-secret

