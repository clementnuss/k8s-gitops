---
# ForwardAuth middleware for n8r.ch domain — replaces nginx.ingress.kubernetes.io/auth-url annotations
# Reference from any namespace as: kube-traefik-oauth2-n8r@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-n8r
  namespace: kube-traefik
spec:
  forwardAuth:
    address: "https://auth.n8r.ch/oauth2/auth"
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
