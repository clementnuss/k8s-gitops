---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 5m
  chart:
    spec:
      chart: longhorn
      version: 1.10.2
      sourceRef:
        kind: HelmRepository
        name: longhorn-charts
        namespace: flux-system
      interval: 5m
  values:
    preUpgradeChecker:
      upgradeVersionCheck: false

    image:
      longhorn:
        manager:
          tag: v1.10.1-hotfix-2

    persistence:
      defaultClass: false
      defaultDataLocality: best-effort
      reclaimPolicy: Retain

    longhornUI:
      replicas: 1

    ingress:
      enabled: true
      ingressClassName: traefik
      host: longhorn.n8r.ch
      tls: true
      secureBackends: false
      # tlsSecret: longhorn.n8r.ch
      path: /
      annotations:
        traefik.ingress.kubernetes.io/router.middlewares: appl-n8r-oauth2-n8r@kubernetescrd
