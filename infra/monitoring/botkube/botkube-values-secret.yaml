---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: botkube-helm-values
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: botkube-helm-values
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
  - extract:
      key: k8s/monitoring/botkube-helm-values

