---
# ForwardAuth middleware for n8r.ch — points at oauth2-proxy root (not /oauth2/auth)
# Root path: unauthenticated → 302 directly to Dex (browsers follow 302)
#            authenticated  → 200 via file:///dev/null upstream (ForwardAuth allows)
# Reference from any namespace as: kube-traefik-oauth2-n8r@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-n8r
  namespace: kube-traefik
spec:
  forwardAuth:
    address: "http://oauth2-proxy.appl-n8r.svc.cluster.local/"
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
