---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kopia-repl-fw-laptop
  namespace: appl-kopia-repl
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: kopia-repl-fw-laptop
    creationPolicy: Owner
  dataFrom:
    # Per-repo config: the repo subpath under both WebDAV base URLs, and its password.
    # OpenBao path: secret/k8s/appl-kopia-repl/fw-laptop
    # Keys:
    #   KOPIA_REPO_PATH  - subpath under the WebDAV base URL (e.g. kopia-cjmn-fw-laptop)
    #   KOPIA_PASSWORD   - kopia repository password for this repo
    - extract:
        key: k8s/appl-kopia-repl/fw-laptop