---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-kopia
  namespace: appl-n8r
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: paperless-kopia
    creationPolicy: Owner
  dataFrom:
    # Per-repo config for the paperless backup repos. Same path + password
    # are used on both syno-nuss-roy and syno-coeuve (same kopia parameters,
    # two independent repos at the same subpath on each NAS).
    # WebDAV endpoint creds come from the shared webdav-syno-* secrets
    # (see appl-n8r/webdav-syno-*.yaml), not from here.
    # OpenBao path: secret/k8s/appl-n8r/paperless-ngx/kopia
    # Keys:
    #   KOPIA_REPO_PATH    - subpath under the WebDAV base URL (e.g. paperless-backup)
    #   KOPIA_PASSWORD     - kopia repository password
    - extract:
        key: k8s/appl-n8r/paperless-ngx/kopia