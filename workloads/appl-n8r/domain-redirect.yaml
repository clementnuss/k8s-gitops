---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: n8r-ch-redirect
  namespace: appl-n8r
spec:
  parentRefs:
    - name: traefik
      namespace: kube-traefik
  hostnames:
    - n8r.ch
    - www.n8r.ch
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            hostname: clement.n8r.ch
            statusCode: 301
