---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dex
  namespace: appl-n8r
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://charts.dexidp.io
      chart: dex
      version: 0.24.1
      sourceRef:
        kind: HelmRepository
        name: dex-charts
        namespace: flux-system
      interval: 5m
  values:
    replicaCount: 1

    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: dex.n8r.ch
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - dex.n8r.ch

    # All secrets injected as env vars via envFrom.
    # ESO syncs them from OpenBao into the dex-secrets Secret with
    # uppercase keys (GOOGLE_CLIENT_ID, etc). Dex's gomplate entrypoint
    # renders them as {{ .Env.GOOGLE_CLIENT_ID }} in the config.
    envFrom:
      - secretRef:
          name: dex-secrets

    config:
      issuer: https://dex.n8r.ch

      storage:
        type: kubernetes
        config:
          inCluster: true

      web:
        http: 0.0.0.0:5556

      expiry:
        idTokens: 24h
        refreshTokens:
          validIfNotUsedFor: 168h  # 7 days

      oauth2:
        skipApprovalScreen: true

      connectors:
        - type: google
          id: google
          name: Google
          config:
            clientID: "{{ .Env.GOOGLE_CLIENT_ID }}"
            clientSecret: "{{ .Env.GOOGLE_CLIENT_SECRET }}"
            redirectURI: https://dex.n8r.ch/callback

      staticClients:
        - id: oauth2-proxy
          name: OAuth2 Proxy
          secret: "{{ .Env.OAUTH2_PROXY_SECRET }}"
          redirectURIs:
            - https://auth.n8r.ch/oauth2/callback
        - id: listmonk
          name: Listmonk
          secret: "{{ .Env.LISTMONK_SECRET }}"
          redirectURIs:
            - https://listmonk.n8r.ch/auth/oidc
        - id: paperless
          name: Paperless-ngx
          secret: "{{ .Env.PAPERLESS_SECRET }}"
          redirectURIs:
            - https://paperless.n8r.ch/accounts/oidc/dex/login/callback/
        - id: claper
          name: Claper
          secret: "{{ .Env.CLAPER_SECRET }}"
          redirectURIs:
            - https://claper.n8r.ch/users/oidc/callback
        - id: immich
          name: Immich
          secret: "{{ .Env.IMMICH_SECRET }}"
          redirectURIs:
            - https://photos.n8r.ch/auth/login
            - https://photos.n8r.ch/user-settings
            - app.immich:///oauth-callback
        - id: filebrowser
          name: Filebrowser
          secret: "{{ .Env.FILEBROWSER_SECRET }}"
          redirectURIs:
            - https://files.n8r.ch/api/auth/oidc/callback
        - id: openbao
          name: OpenBao
          secret: "{{ .Env.OPENBAO_SECRET }}"
          redirectURIs:
            - https://openbao.n8r.ch/ui/vault/auth/dex/oidc/callback
            - http://localhost:8250/oidc/callback
