---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-secrets
  namespace: appl-n8r
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: dex-secrets
    creationPolicy: Owner
  dataFrom:
    # Extracts all keys from secret/k8s/appl-n8r/dex in OpenBao.
    # Keys must be valid env var names (uppercase with underscores)
    # since envFrom injects them directly as env vars.
    - extract:
        key: k8s/appl-n8r/dex