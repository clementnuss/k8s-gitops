---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secrets
  namespace: appl-n8r
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-secrets
    creationPolicy: Owner
  dataFrom:
    # OAUTH2_PROXY_COOKIE_SECRET + allowed-emails (app-specific)
    - extract:
        key: k8s/appl-n8r/oauth2-proxy-secrets
  data:
    # Client secret pulled from the dex secret to avoid duplication.
    # Renamed to OAUTH2_PROXY_CLIENT_SECRET so oauth2-proxy picks it up
    # via envFrom without explicit env config.
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: k8s/appl-n8r/dex
        property: OAUTH2_PROXY_SECRET

