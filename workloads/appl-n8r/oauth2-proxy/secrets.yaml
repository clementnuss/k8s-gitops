---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secrets
  namespace: appl-n8r
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-secrets
    creationPolicy: Owner
  data:
    # Chart expects keys: client-id, client-secret, cookie-secret
    # (see config.requiredSecretKeys in the oauth2-proxy chart).
    # Plus allowed-emails for the file mount.
    - secretKey: client-id
      remoteRef:
        key: k8s/appl-n8r/oauth2-proxy-secrets
        property: OAUTH2_PROXY_CLIENT_ID
    - secretKey: client-secret
      remoteRef:
        key: k8s/appl-n8r/dex
        property: OAUTH2_PROXY_SECRET
    - secretKey: cookie-secret
      remoteRef:
        key: k8s/appl-n8r/oauth2-proxy-secrets
        property: OAUTH2_PROXY_COOKIE_SECRET
    - secretKey: allowed-emails
      remoteRef:
        key: k8s/appl-n8r/oauth2-proxy-secrets
        property: allowed-emails

