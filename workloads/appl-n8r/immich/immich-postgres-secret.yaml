---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-postgres-secret
  namespace: appl-n8r
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: immich-postgres-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  dataFrom:
  - extract:
      key: k8s/appl-n8r/immich-postgres-secret

