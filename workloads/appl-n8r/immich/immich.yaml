---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: appl-n8r
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: immich-charts
    namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    timeout: 10m
  uninstall:
    keepHistory: false
  values:
    immich:
      persistence:
        library:
          existingClaim: immich-library

    controllers:
      main:
        containers:
          main:
            env:
              DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: DB_URL

    server:
      enabled: true
      ingress:
        main:
          enabled: true
          className: traefik
          annotations:
            traefik.ingress.kubernetes.io/router.middlewares: ""
          hosts:
            - host: photos.n8r.ch
              paths:
                - path: /
          tls:
            - hosts:
                - photos.n8r.ch

    machine-learning:
      enabled: true
      persistence:
        cache:
          size: 10Gi
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 4Gi

    valkey:
      enabled: true
