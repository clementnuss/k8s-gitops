---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-kopia
  namespace: appl-n8r
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: immich-kopia
    creationPolicy: Owner
  dataFrom:
    # Per-repo config for the immich backup repos. Same path + password
    # are used on both destinations (syno-coeuve WebDAV and cloud S3).
    # Endpoint creds come from the respective endpoint secrets, not from here.
    # OpenBao path: secret/k8s/appl-n8r/immich/kopia
    # Keys:
    #   KOPIA_REPO_PATH    - subpath under the WebDAV base URL / S3 prefix
    #   KOPIA_PASSWORD     - kopia repository password
    - extract:
        key: k8s/appl-n8r/immich/kopia