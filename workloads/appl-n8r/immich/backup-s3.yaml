---
# Independent Kopia backup of immich to Backblaze B2 (cloud S3).
# Uses the immich-kopia ExternalSecret (OpenBao) for repo path + password
# (shared with the coeuve job) and the backblaze-s3 shared endpoint secret
# for S3 transport creds.
#
# Secrets:
#   immich-kopia   - KOPIA_REPO_PATH + KOPIA_PASSWORD (shared with coeuve job)
#   backblaze-s3   - KOPIA_S3_BUCKET + KOPIA_S3_ENDPOINT + KOPIA_S3_ACCESS_KEY + KOPIA_S3_SECRET_KEY (shared endpoint)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-backup-s3
  namespace: appl-n8r
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: kopia
              image: kopia/kopia:0.23.1
              command:
                - /bin/sh
                - -c
                - |
                  set -eu

                  echo "=== Connecting to (or creating) S3 repository ==="
                  kopia repository connect s3 \
                    --bucket="$KOPIA_S3_BUCKET" \
                    --access-key="$KOPIA_S3_ACCESS_KEY" \
                    --secret-access-key="$KOPIA_S3_SECRET_KEY" \
                    --endpoint="$KOPIA_S3_ENDPOINT" \
                    --prefix="$KOPIA_REPO_PATH/" \
                    --override-username=immich \
                    --override-hostname=planchettes63 || \
                  kopia repository create s3 \
                    --bucket="$KOPIA_S3_BUCKET" \
                    --access-key="$KOPIA_S3_ACCESS_KEY" \
                    --secret-access-key="$KOPIA_S3_SECRET_KEY" \
                    --endpoint="$KOPIA_S3_ENDPOINT" \
                    --prefix="$KOPIA_REPO_PATH/"

                  kopia repository throttle set --upload-bytes-per-second=31457280
                  kopia policy set --global \
                    --keep-latest=7 \
                    --keep-daily=7 \
                    --keep-weekly=4 \
                    --keep-monthly=6 \
                    --keep-annual=1

                  echo "=== Creating snapshot of /data ==="
                  kopia snapshot create /data/backups /data/library /data/upload

                  echo "=== Snapshots ==="
                  kopia snapshot list --all

                  kopia repository disconnect
                  echo "=== Done ==="
              envFrom:
                # Per-repo: KOPIA_REPO_PATH + KOPIA_PASSWORD.
                - secretRef:
                    name: immich-kopia
              env:
                # S3 endpoint creds (shared backblaze-s3).
                - name: KOPIA_S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: backblaze-s3
                      key: KOPIA_S3_BUCKET
                - name: KOPIA_S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: backblaze-s3
                      key: KOPIA_S3_ENDPOINT
                - name: KOPIA_S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backblaze-s3
                      key: KOPIA_S3_ACCESS_KEY
                - name: KOPIA_S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backblaze-s3
                      key: KOPIA_S3_SECRET_KEY
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: kopia-cache
                  mountPath: /root/.cache/kopia
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: immich-library
            - name: kopia-cache
              emptyDir: {}
---
# Weekly deep verification of the immich Backblaze B2 backup repository.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-verify-s3
  namespace: appl-n8r
spec:
  schedule: "30 4 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: kopia
              image: kopia/kopia:0.23.1
              command:
                - /bin/sh
                - -c
                - |
                  set -eu

                  echo "=== Connecting to S3 repository for verification ==="
                  kopia repository connect s3 \
                    --bucket="$KOPIA_S3_BUCKET" \
                    --access-key="$KOPIA_S3_ACCESS_KEY" \
                    --secret-access-key="$KOPIA_S3_SECRET_KEY" \
                    --endpoint="$KOPIA_S3_ENDPOINT" \
                    --prefix="$KOPIA_REPO_PATH/"

                  echo "=== Verifying all snapshots (downloads and hashes every block) ==="
                  kopia snapshot verify --all-snapshots

                  kopia repository disconnect
                  echo "=== Verification complete ==="
              envFrom:
                - secretRef:
                    name: immich-kopia
              env:
                - name: KOPIA_S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: backblaze-s3
                      key: KOPIA_S3_BUCKET
                - name: KOPIA_S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: backblaze-s3
                      key: KOPIA_S3_ENDPOINT
                - name: KOPIA_S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backblaze-s3
                      key: KOPIA_S3_ACCESS_KEY
                - name: KOPIA_S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backblaze-s3
                      key: KOPIA_S3_SECRET_KEY
              volumeMounts:
                - name: kopia-cache
                  mountPath: /root/.cache/kopia
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: kopia-cache
              emptyDir: {}
