---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: filebrowser
  namespace: appl-n8r
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
    timeout: 10m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    timeout: 10m
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0
        containers:
          main:
            image:
              repository: gtstef/filebrowser
              tag: stable
              pullPolicy: Always
            env:
              TZ: "Europe/Zurich"
            envFrom:
              - secretRef:
                  name: filebrowser-secret
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      main:
        type: ClusterIP
        ports:
          http:
            port: 80

    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: files.n8r.ch
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - files.n8r.ch
            secretName: files.n8r.ch-tls

    persistence:
      data:
        existingClaim: filebrowser-data
        globalMounts:
          - path: /srv
      config:
        type: configMap
        name: filebrowser-config
        globalMounts:
          - path: /home/filebrowser/data/config.yaml
            subPath: config.yaml
      database:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: longhorn-2-replicas
        size: 1Gi
        globalMounts:
          - path: /home/filebrowser/data