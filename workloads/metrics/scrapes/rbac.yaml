---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vmagent-proxy
rules:
  - apiGroups: [""]
    resources:
      - nodes/proxy
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - nodes/metrics
    verbs: ["get"]
  - nonResourceURLs: ["/metrics", "/metrics/resources", "/metrics/slis"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vmagent-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vmagent-proxy
subjects:
  - kind: ServiceAccount
    name: vmagent-vmagent
    namespace: metrics