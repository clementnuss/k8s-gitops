---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-admin-secret
  namespace: appl-postgres
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: app-admin-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  dataFrom:
  - extract:
      key: k8s/appl-postgres/app-admin-secret

